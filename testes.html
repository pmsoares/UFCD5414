<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .quadrado {
            background: green;
            height: 200px;
            width: 200px;
        }

        .relativo {
            position: relative;
        }

        .absoluto {
            position: absolute;
            top: 20px;
            right: 30px;
        }
    </style>
</head>

<body>
    <div class="quadrado relativo">
        <div class="quadrado absoluto"></div>
    </div>
</body>

</html>
